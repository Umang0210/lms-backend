name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-checks:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MONGO_URI: mongodb://localhost:27017/lms_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm run check:syntax

      - name: Run npm test
        run: npm test

      - name: Start server
        run: |
          npm run start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server and run smoke test
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:8080/api/users > /tmp/users.json; then
              echo "Smoke test passed"
              cat /tmp/users.json
              exit 0
            fi
            sleep 2
          done
          echo "Server failed smoke test"
          echo "---- server.log ----"
          cat server.log
          exit 1

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
